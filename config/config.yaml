# Social Media Aggregator Configuration

app:
  name: "Social Media Aggregator"
  version: "2.0.0"
  debug: false

features:
  - 10M posts/day
  - Sentiment
  - Analytics

tech_stack:
  - Twitter API
  - Redis
  - NLP

server:
  host: "0.0.0.0"
  port: 8000
  workers: 4

logging:
  level: INFO
  format: "%(asctime)s | %(levelname)s | %(message)s"
